
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc" id="theme-color-meta">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <title>RotaFinanceira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
<style>
  /* Prevenção de seleção de texto indesejada e comportamentos mobile */
  * {
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    background-color: #f8fafc; /* Default light bg */
  }
  html.dark, html.dark body {
    background-color: #020617; /* Default dark bg (slate-950) */
  }
  input, textarea {
    user-select: text;
  }
  body {
    overscroll-behavior-y: none;
  }
</style>
<link rel="stylesheet" href="/index.css">
<script>
  // Script de bloqueio de flash de tema
  (function() {
    try {
      // Tenta pegar de várias fontes para garantir
      const configStr = localStorage.getItem('rota_financeira_config') || localStorage.getItem('theme_hint');
      let isDark = false;
      
      if (configStr) {
        if (configStr === 'dark') isDark = true;
        else if (configStr === 'light') isDark = false;
        else {
          try {
            const config = JSON.parse(configStr);
            const mode = config.themeMode || 'auto';
            isDark = mode === 'dark' || (mode === 'auto' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          } catch(e) {
            isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
        }
      } else {
        isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      if (isDark) {
        document.documentElement.classList.add('dark');
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#020617');
      }
    } catch (e) {}
  })();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(registration => {
          console.log('SW registrado com sucesso:', registration.scope);
          
          // Verifica atualizações a cada 1 hora
          setInterval(() => {
            registration.update();
          }, 1000 * 60 * 60);

          // Listener para novas versões
          registration.onupdatefound = () => {
            const installingWorker = registration.installing;
            if (installingWorker) {
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    console.log('Nova versão disponível! Por favor, recarregue.');
                  }
                }
              };
            }
          };
        })
        .catch(error => {
          console.error('Erro ao registrar SW:', error);
        });
    });

    // Recarrega quando o novo SW assume o controle
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) {
        refreshing = true;
        window.location.reload();
      }
    });
  }
</script>
</head>
<body class="text-slate-900 antialiased">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
